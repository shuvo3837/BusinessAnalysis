services:
  - type: web
    name: bizmind-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:web && npm run build:server
    startCommand: node dist/server.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@bizmind.local
      - key: ADMIN_PASSWORD
        value: BizMindAdmin2026!
      - key: MONGODB_URI
        value: ""
    disk:
      name: bizmind-data
      mountPath: /data
      sizeGB: 1
